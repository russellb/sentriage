# Sync workflow: poll monitored repos for new/updated security advisories
# and create/update tracking issues.
#
# Requires a PAT with repo scope stored as ADVISORY_TOKEN.  The default
# Actions GITHUB_TOKEN would suppress workflow triggers, so the PAT is
# used instead so that issue-creation events trigger triage.
# Does NOT run Claude.

name: Sentriage Sync Reports

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      ghsa_id:
        description: 'Sync only this GHSA ID (e.g. GHSA-xxxx-xxxx-xxxx)'
        required: false

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: russellb/sentriage
          sparse-checkout: scripts
          path: sentriage

      - uses: actions/checkout@v4
        with:
          path: instance

      - name: Install dependencies
        run: |
          python3 -m venv /opt/sentriage-venv
          /opt/sentriage-venv/bin/pip install pyyaml
          echo "/opt/sentriage-venv/bin" >> "$GITHUB_PATH"

      - name: Sync reports
        env:
          GITHUB_TOKEN: ${{ secrets.ADVISORY_TOKEN }}
          GHSA_ID: ${{ inputs.ghsa_id }}
        working-directory: instance
        run: |
          GHSA_ARG=""
          if [ -n "$GHSA_ID" ]; then
            GHSA_ARG="--ghsa-id $GHSA_ID"
          fi
          python3 ../sentriage/scripts/sync-reports.py --config sentriage.yml $GHSA_ARG
