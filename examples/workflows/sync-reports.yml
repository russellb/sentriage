# Sync workflow: poll monitored repos for new/updated security advisories
# and create/update tracking issues.
#
# Uses two tokens:
#   GITHUB_TOKEN (default) — creates/updates issues and labels in this repo
#   ADVISORY_TOKEN (secret) — PAT with repo scope to read advisories
# Does NOT run Claude.

name: Sentriage Sync Reports

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: russellb/sentriage
          sparse-checkout: scripts
          path: sentriage

      - uses: actions/checkout@v4
        with:
          path: instance

      - name: Install dependencies
        run: |
          python3 -m venv /opt/sentriage-venv
          /opt/sentriage-venv/bin/pip install pyyaml
          echo "/opt/sentriage-venv/bin" >> "$GITHUB_PATH"

      - name: Sync reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ADVISORY_TOKEN: ${{ secrets.ADVISORY_TOKEN }}
        working-directory: instance
        run: python3 ../sentriage/scripts/sync-reports.py --config sentriage.yml
