# Triage workflow: run Claude skills when new issues are created or
# when the needs-triage label is applied.
#
# Runs in the agentic-ci OpenShell image with sandboxed Claude execution.
# Uses the default GITHUB_TOKEN — no access to monitored repos.
#
# Required secrets:
#   GCP_PROJECT_ID    — GCP project for Vertex AI (if using Vertex)
#   GCP_CREDENTIALS   — GCP credentials JSON (if using Vertex)
#   ANTHROPIC_API_KEY — Anthropic API key (if using direct API)
#
# Configure the env block below for your AI backend.

name: Sentriage Triage

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    if: >
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'needs-triage')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'needs-triage')
    runs-on: ubuntu-latest
    container:
      image: quay.io/aipcc/agentic-ci/openshell:0.3.13
    timeout-minutes: 60
    env:
      # --- AI backend config (Vertex AI example) ---
      CLAUDE_CODE_USE_VERTEX: "1"
      ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      CLOUD_ML_REGION: "us-east5"
      GOOGLE_APPLICATION_CREDENTIALS: "/tmp/gcp-key.json"
      # --- For direct Anthropic API, replace the above with: ---
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # ---
      CLAUDE_MODEL: "claude-opus-4-6"
      CLAUDE_CONTAINER_IMAGE: "quay.io/aipcc/agentic-ci/claude-sandbox:0.3.13"
      OPENSHELL_SUPERVISOR_IMAGE: "quay.io/mprpic/openshell-supervisor:pr1763"
      GITHUB_TOKEN: ${{ github.token }}
      SENTRIAGE_ROOT: ${{ github.workspace }}/sentriage
    steps:
      - name: Configure container storage
        run: |
          : > /etc/subuid
          : > /etc/subgid
          printf '[storage]\ndriver = "vfs"\n' > /etc/containers/storage.conf

      - uses: actions/checkout@v4
        with:
          repository: russellb/sentriage
          path: sentriage

      - uses: actions/checkout@v4
        with:
          path: instance

      - name: Setup credentials
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          if [ -n "$GCP_CREDENTIALS" ]; then
            echo "$GCP_CREDENTIALS" > /tmp/gcp-key.json
            chmod 644 /tmp/gcp-key.json
          fi
          chmod -R a+rwX "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/instance"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/sentriage"

      - name: Check duplicates
        id: check-duplicates
        working-directory: instance
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SKILL: check-duplicates
        run: bash ../sentriage/actions/run-skill/run.sh

      - name: Validate and assess severity
        id: validate-and-assess
        if: steps.check-duplicates.outputs.recommendation != 'duplicate'
        working-directory: instance
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SKILL: validate-and-assess
        run: bash ../sentriage/actions/run-skill/run.sh

      - name: Finalize triage
        working-directory: instance
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash ../sentriage/actions/finalize-triage/finalize.sh
