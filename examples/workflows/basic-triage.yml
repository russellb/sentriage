# Triage workflow: run Claude skills when new issues are created or
# when the needs-triage label is applied.
#
# This workflow uses the default GITHUB_TOKEN which only has access to
# the instance repo. It does NOT have access to monitored repos' advisories.

name: Sentriage Triage

on:
  issues:
    types: [opened, labeled]

jobs:
  triage:
    if: >
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'needs-triage')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'needs-triage')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: sentriage/sentriage
          path: sentriage

      - uses: actions/checkout@v4
        with:
          path: instance

      - name: Check duplicates
        id: check-duplicates
        uses: ./sentriage/actions/run-skill
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          skill: check-duplicates

      - name: Check validity
        id: check-validity
        if: steps.check-duplicates.outputs.recommendation != 'duplicate'
        uses: ./sentriage/actions/run-skill
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          skill: check-validity

      - name: Assess severity
        if: >
          steps.check-duplicates.outputs.recommendation != 'duplicate' &&
          steps.check-validity.outputs.recommendation != 'invalid'
        uses: ./sentriage/actions/run-skill
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          skill: assess-severity

      - name: Finalize triage
        uses: ./sentriage/actions/finalize-triage
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
