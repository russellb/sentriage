# Gated triage workflow: triage only runs when a human applies
# the needs-triage label. Use this with sync-reports.yml configured
# to use --initial-label new-report.
#
# Uses the default GITHUB_TOKEN — no access to monitored repos needed.

name: Sentriage Gated Triage

on:
  issues:
    types: [labeled]

jobs:
  triage:
    if: github.event.action == 'labeled' && github.event.label.name == 'needs-triage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: russellb/sentriage
          path: sentriage

      - uses: actions/checkout@v4
        with:
          path: instance

      - name: Check duplicates
        id: check-duplicates
        uses: ./sentriage/actions/run-skill
        with:
          github-token: ${{ github.token }}
          issue-number: ${{ github.event.issue.number }}
          skill: check-duplicates

      - name: Check validity
        id: check-validity
        if: steps.check-duplicates.outputs.recommendation != 'duplicate'
        uses: ./sentriage/actions/run-skill
        with:
          github-token: ${{ github.token }}
          issue-number: ${{ github.event.issue.number }}
          skill: check-validity

      - name: Assess severity
        if: >
          steps.check-duplicates.outputs.recommendation != 'duplicate' &&
          steps.check-validity.outputs.recommendation != 'invalid'
        uses: ./sentriage/actions/run-skill
        with:
          github-token: ${{ github.token }}
          issue-number: ${{ github.event.issue.number }}
          skill: assess-severity

      - name: Finalize triage
        uses: ./sentriage/actions/finalize-triage
        with:
          github-token: ${{ github.token }}
          issue-number: ${{ github.event.issue.number }}
