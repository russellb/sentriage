# Example sentriage configuration for monitoring repositories.
# Copy this to sentriage.yml in your instance repo and customize.

monitored_repos:
  - repo: your-org/your-repo
    clone: true
    context_refs:
      # Simple form: included for all skills
      - SECURITY.md
      # Scoped form: only included for specific skills
      - path: docs/security-policy.md
        skills: [validate-and-assess]
